<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Uber - Conductor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para íconos (campana) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* Pantalla de carga */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .spinner-large {
            border: 6px solid rgba(255,255,255,0.3);
            border-left-color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modales de login/registro */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            position: relative;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover { color: #333; }

        h2 { text-align: center; color: #1e3c72; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        input:focus, select:focus { border-color: #1e3c72; outline: none; }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #2a4b8a; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .switch-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
        }

        .switch-link a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .switch-link a:hover { text-decoration: underline; }

        .message {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .error-message { background-color: #f8d7da; color: #721c24; }
        .success-message { background-color: #d4edda; color: #155724; }

        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-left-color: #1e3c72;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 10px auto 0;
            display: none;
        }

        /* Panel principal */
        #main-panel {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Campana de notificaciones */
        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: #555;
        }

        .notification-bell .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 18px;
            text-align: center;
            display: none;
        }

        .notification-dropdown {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 350px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 100;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .notification-dropdown.show {
            display: block;
        }

        .notification-header {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notification-item {
            padding: 15px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: background 0.2s;
        }

        .notification-item:hover {
            background: #f9f9f9;
        }

        .notification-item.unread {
            background: #e3f2fd;
        }

        .notification-item .trip-info {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .notification-item .trip-details {
            font-size: 0.9rem;
            color: #666;
        }

        .notification-item .accept-btn {
            margin-top: 10px;
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            font-size: 0.9rem;
        }

        .notification-item .accept-btn:hover {
            background: #218838;
        }

        .no-notifications {
            padding: 20px;
            text-align: center;
            color: #999;
        }

        #logout-btn {
            width: auto;
            padding: 8px 16px;
            background-color: #dc3545;
        }
        #logout-btn:hover { background-color: #c82333; }

        /* Contenido principal (solo conductor) */
        .driver-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .driver-panel h3 {
            margin-bottom: 15px;
            color: #1e3c72;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .availability-toggle {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #28a745;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Viaje actual */
        .current-trip {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-pending { background-color: #ffc107; color: #856404; }
        .status-accepted { background-color: #17a2b8; color: white; }
        .status-started { background-color: #007bff; color: white; }
        .status-completed { background-color: #28a745; color: white; }

        /* Botones pequeños */
        .btn-small {
            width: auto;
            padding: 8px 16px;
            font-size: 0.9rem;
            margin-top: 10px;
            display: inline-block;
        }

        /* Lista de viajes */
        .list-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #1e3c72;
        }

        .list-item p {
            margin: 5px 0;
        }

        h4 {
            margin: 20px 0 10px;
            color: #1e3c72;
        }
    </style>
</head>
<body>
    <!-- Pantalla de carga -->
    <div id="loading-screen">
        <div class="spinner-large"></div>
    </div>

    <!-- Modal de Login -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-login">&times;</span>
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" id="login-btn">Entrar</button>
                <div class="spinner" id="login-spinner"></div>
                <div class="message error-message" id="login-error"></div>
            </form>
            <div class="switch-link">
                ¿No tienes cuenta? <a id="show-register">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="register-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-register">&times;</span>
            <h2>Crear Cuenta</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-fullname">Nombre completo</label>
                    <input type="text" id="register-fullname" required>
                </div>
                <div class="form-group">
                    <label for="register-code">Código numérico (8 dígitos)</label>
                    <input type="text" id="register-code" maxlength="8" pattern="\d{8}" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Correo electrónico</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" required>
                </div>
                <div class="form-group">
                    <label for="register-role">Tipo de usuario</label>
                    <select id="register-role" required>
                        <option value="conductor">Conductor</option>
                        <!-- Solo permitimos conductores en esta app -->
                    </select>
                </div>
                <button type="submit" id="register-btn">Registrarse</button>
                <div class="spinner" id="register-spinner"></div>
                <div class="message error-message" id="register-error"></div>
                <div class="message success-message" id="register-success"></div>
            </form>
            <div class="switch-link">
                ¿Ya tienes cuenta? <a id="show-login">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <!-- Panel principal (solo conductores) -->
    <div id="main-panel">
        <header>
            <h1>Mi Uber - Conductor</h1>
            <div class="user-info">
                <span id="user-name"></span>
                <!-- Campana de notificaciones -->
                <div class="notification-bell" id="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span class="badge" id="notification-badge">0</span>
                </div>
                <button id="logout-btn">Cerrar sesión</button>
            </div>
            <!-- Dropdown de notificaciones -->
            <div class="notification-dropdown" id="notification-dropdown">
                <div class="notification-header">
                    <span>Solicitudes de viaje</span>
                    <small id="unread-count">0 nuevas</small>
                </div>
                <div id="notifications-list">
                    <div class="no-notifications">No hay solicitudes pendientes</div>
                </div>
            </div>
        </header>

        <div class="driver-panel">
            <h3>Panel del Conductor</h3>
            <div class="availability-toggle">
                <span>Disponible para viajes:</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="availability-checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Viaje actual -->
            <div id="current-trip-container" style="display: none;">
                <h4>Viaje actual</h4>
                <div id="current-trip-info" class="current-trip"></div>
            </div>

            <!-- Historial de viajes -->
            <h4>Viajes recientes</h4>
            <div id="trips-history"></div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Configuración Supabase
        const SUPABASE_URL = 'https://ajmxtbafpcwjbhtkswuu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbXh0YmFmcGN3amJodGtzd3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzQyMTEsImV4cCI6MjA4ODc1MDIxMX0.NNNOTr05ef6umCGhKH5GId_j9uoVBzJJfGk6e4rsmQ0';
        
        // Crear cliente Supabase (solo una vez)
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Estado global
        let currentUser = null;
        let userProfile = null;
        let subscriptions = [];
        let pendingTrips = []; // Solicitudes pendientes (no leídas)
        let unreadCount = 0;
        let currentTripId = null; // ID del viaje actual

        // Elementos DOM
        const loadingScreen = document.getElementById('loading-screen');
        const loginModal = document.getElementById('login-modal');
        const registerModal = document.getElementById('register-modal');
        const mainPanel = document.getElementById('main-panel');
        const userNameSpan = document.getElementById('user-name');
        const logoutBtn = document.getElementById('logout-btn');
        const notificationBell = document.getElementById('notification-bell');
        const notificationDropdown = document.getElementById('notification-dropdown');
        const notificationBadge = document.getElementById('notification-badge');
        const notificationsList = document.getElementById('notifications-list');
        const unreadCountSpan = document.getElementById('unread-count');

        // Funciones auxiliares
        function showModal(modal) {
            modal.classList.add('active');
        }
        function hideModals() {
            loginModal.classList.remove('active');
            registerModal.classList.remove('active');
        }
        function showError(element, msg) {
            element.textContent = msg;
            element.style.display = 'block';
        }
        function showSuccess(element, msg) {
            element.textContent = msg;
            element.style.display = 'block';
        }

        // Limpiar suscripciones
        function unsubscribeAll() {
            subscriptions.forEach(sub => sub.unsubscribe());
            subscriptions = [];
        }

        // Verificar sesión al cargar
        async function checkSession() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    await loadUserProfile(session.user.id);
                } else {
                    showLogin();
                }
            } catch (err) {
                console.error(err);
                showLogin();
            } finally {
                loadingScreen.style.display = 'none';
            }
        }

        async function loadUserProfile(userId) {
            const { data, error } = await supabaseClient
                .from('user_profiles')
                .select('*')
                .eq('id', userId)
                .single();
            if (error || !data) {
                console.error('Error cargando perfil:', error);
                await supabaseClient.auth.signOut();
                showLogin();
                return;
            }
            userProfile = data;
            currentUser = (await supabaseClient.auth.getUser()).data.user;
            userNameSpan.textContent = userProfile.full_name;
            mainPanel.style.display = 'block';
            hideModals();

            // Inicializar UI de conductor
            initDriverUI();
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            const errorDiv = document.getElementById('login-error');
            btn.disabled = true;
            spinner.style.display = 'block';
            errorDiv.style.display = 'none';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                showError(errorDiv, error.message);
                btn.disabled = false;
                spinner.style.display = 'none';
                return;
            }
            await loadUserProfile(data.user.id);
        });

        // Registro
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('register-fullname').value;
            const numericCode = document.getElementById('register-code').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const role = 'conductor'; // Solo conductores
            const btn = document.getElementById('register-btn');
            const spinner = document.getElementById('register-spinner');
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');

            btn.disabled = true;
            spinner.style.display = 'block';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validar código
            if (!/^\d{8}$/.test(numericCode)) {
                showError(errorDiv, 'Código debe ser 8 dígitos');
                btn.disabled = false;
                spinner.style.display = 'none';
                return;
            }

            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: fullName,
                        numeric_code: numericCode,
                        role
                    }
                }
            });

            if (error) {
                showError(errorDiv, error.message);
                btn.disabled = false;
                spinner.style.display = 'none';
                return;
            }

            showSuccess(successDiv, 'Registro exitoso. Redirigiendo al login...');
            setTimeout(() => {
                registerModal.classList.remove('active');
                loginModal.classList.add('active');
                document.getElementById('register-form').reset();
                btn.disabled = false;
                spinner.style.display = 'none';
                successDiv.style.display = 'none';
            }, 2000);
        });

        // Navegación entre modales
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            loginModal.classList.remove('active');
            registerModal.classList.add('active');
        });
        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            registerModal.classList.remove('active');
            loginModal.classList.add('active');
        });
        document.getElementById('close-login').addEventListener('click', () => loginModal.classList.remove('active'));
        document.getElementById('close-register').addEventListener('click', () => registerModal.classList.remove('active'));

        // Cerrar sesión
        logoutBtn.addEventListener('click', async () => {
            unsubscribeAll();
            await supabaseClient.auth.signOut();
            currentUser = null;
            userProfile = null;
            mainPanel.style.display = 'none';
            showLogin();
        });

        function showLogin() {
            hideModals();
            showModal(loginModal);
        }

        // ========== LÓGICA DE CONDUCTOR ==========
        async function initDriverUI() {
            // Mostrar estado actual de disponibilidad
            const availCheckbox = document.getElementById('availability-checkbox');
            availCheckbox.checked = userProfile.available || false;

            // Toggle disponibilidad
            availCheckbox.addEventListener('change', async (e) => {
                const available = e.target.checked;
                const { error } = await supabaseClient
                    .from('user_profiles')
                    .update({ available })
                    .eq('id', currentUser.id);
                if (error) {
                    console.error('Error actualizando disponibilidad:', error);
                    availCheckbox.checked = !available; // revertir
                } else {
                    userProfile.available = available;
                }
            });

            // Cargar solicitudes pendientes iniciales
            await loadPendingTrips();

            // Suscribirse a nuevas solicitudes (INSERT en trips)
            const subscription = supabaseClient
                .channel('pending-trips')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'trips',
                    filter: 'status=eq.pending'
                }, (payload) => {
                    // Nueva solicitud pendiente
                    const newTrip = payload.new;
                    // Solo agregar si no está en la lista y el conductor está disponible
                    if (userProfile.available && !pendingTrips.find(t => t.id === newTrip.id)) {
                        pendingTrips.unshift(newTrip); // Agregar al inicio
                        unreadCount++;
                        updateNotifications();
                    }
                })
                .subscribe();
            subscriptions.push(subscription);

            // Suscripción a actualizaciones (cuando otro conductor acepta, se quita de pendientes)
            const updateSub = supabaseClient
                .channel('trip-updates')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'trips'
                }, (payload) => {
                    // Si ya no está pendiente, remover de la lista
                    if (payload.old && payload.old.status === 'pending' && payload.new.status !== 'pending') {
                        pendingTrips = pendingTrips.filter(t => t.id !== payload.old.id);
                        unreadCount = pendingTrips.length;
                        updateNotifications();
                    }
                })
                .subscribe();
            subscriptions.push(updateSub);

            // Cargar viaje actual
            await loadCurrentTrip();

            // Cargar historial
            await loadTripHistory();

            // Click en campana despliega notificaciones
            notificationBell.addEventListener('click', (e) => {
                e.stopPropagation();
                notificationDropdown.classList.toggle('show');
                if (notificationDropdown.classList.contains('show')) {
                    // Marcar todas como leídas visualmente
                    markAllAsRead();
                }
            });

            // Cerrar dropdown al hacer clic fuera
            document.addEventListener('click', (e) => {
                if (!notificationBell.contains(e.target) && !notificationDropdown.contains(e.target)) {
                    notificationDropdown.classList.remove('show');
                }
            });
        }

        // Cargar solicitudes pendientes desde la BD
        async function loadPendingTrips() {
            const { data, error } = await supabaseClient
                .from('trips')
                .select('*, passenger:passenger_id(full_name)')
                .eq('status', 'pending')
                .is('driver_id', null)
                .order('created_at', { ascending: false });
            if (error) {
                console.error('Error cargando viajes pendientes:', error);
                return;
            }
            pendingTrips = data || [];
            unreadCount = pendingTrips.length;
            updateNotifications();
        }

        // Actualizar la interfaz de notificaciones
        function updateNotifications() {
            // Actualizar badge
            if (unreadCount > 0) {
                notificationBadge.textContent = unreadCount;
                notificationBadge.style.display = 'block';
            } else {
                notificationBadge.style.display = 'none';
            }

            // Actualizar lista en dropdown
            if (pendingTrips.length === 0) {
                notificationsList.innerHTML = '<div class="no-notifications">No hay solicitudes pendientes</div>';
                unreadCountSpan.textContent = '0 nuevas';
                return;
            }

            unreadCountSpan.textContent = `${unreadCount} nueva${unreadCount !== 1 ? 's' : ''}`;

            notificationsList.innerHTML = pendingTrips.map(trip => {
                const passengerName = trip.passenger?.full_name || 'Desconocido';
                return `
                    <div class="notification-item unread" data-trip-id="${trip.id}">
                        <div class="trip-info">
                            <strong>${passengerName}</strong> solicitó un viaje
                        </div>
                        <div class="trip-details">
                            Origen: ${trip.pickup_location}<br>
                            Destino: ${trip.dropoff_location}
                        </div>
                        <button class="accept-btn" data-trip-id="${trip.id}">Aceptar</button>
                    </div>
                `;
            }).join('');

            // Añadir event listeners a los botones de aceptar
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const tripId = e.target.dataset.tripId;
                    await acceptTrip(tripId);
                });
            });
        }

        // Marcar todas como leídas (al abrir dropdown)
        function markAllAsRead() {
            unreadCount = 0;
            notificationBadge.style.display = 'none';
            // En la UI, quitamos la clase unread
            document.querySelectorAll('.notification-item').forEach(item => {
                item.classList.remove('unread');
            });
            unreadCountSpan.textContent = '0 nuevas';
        }

        // Aceptar un viaje
        async function acceptTrip(tripId) {
            // Verificar que el conductor esté disponible
            if (!userProfile.available) {
                alert('Debes estar disponible para aceptar viajes');
                return;
            }

            const { error } = await supabaseClient
                .from('trips')
                .update({ 
                    driver_id: currentUser.id, 
                    status: 'accepted',
                    updated_at: new Date()
                })
                .eq('id', tripId);

            if (error) {
                alert('Error al aceptar viaje: ' + error.message);
            } else {
                // Remover de pendientes
                pendingTrips = pendingTrips.filter(t => t.id !== tripId);
                unreadCount = pendingTrips.length;
                updateNotifications();
                // Cargar viaje actual
                await loadCurrentTrip();
                // Cerrar dropdown
                notificationDropdown.classList.remove('show');
            }
        }

        // Cargar viaje actual (aceptado o iniciado)
        async function loadCurrentTrip() {
            const { data, error } = await supabaseClient
                .from('trips')
                .select('*, passenger:passenger_id(full_name)')
                .eq('driver_id', currentUser.id)
                .in('status', ['accepted', 'started'])
                .maybeSingle();
            if (error) {
                console.error('Error cargando viaje actual:', error);
                return;
            }
            const container = document.getElementById('current-trip-container');
            const infoDiv = document.getElementById('current-trip-info');
            if (data) {
                currentTripId = data.id; // Guardar el ID del viaje actual
                container.style.display = 'block';
                infoDiv.innerHTML = `
                    <p><strong>Pasajero:</strong> ${data.passenger?.full_name || 'Desconocido'}</p>
                    <p><strong>Origen:</strong> ${data.pickup_location}</p>
                    <p><strong>Destino:</strong> ${data.dropoff_location}</p>
                    <p><strong>Estado:</strong> <span class="status-badge status-${data.status}">${data.status}</span></p>
                    ${data.status === 'accepted' ? '<button class="btn-small" id="start-trip-btn">Iniciar viaje</button>' : ''}
                    ${data.status === 'started' ? '<button class="btn-small" id="complete-trip-btn">Completar viaje</button>' : ''}
                `;
                if (data.status === 'accepted') {
                    document.getElementById('start-trip-btn')?.addEventListener('click', () => updateTripStatus(currentTripId, 'started'));
                } else if (data.status === 'started') {
                    document.getElementById('complete-trip-btn')?.addEventListener('click', () => updateTripStatus(currentTripId, 'completed'));
                }
            } else {
                currentTripId = null;
                container.style.display = 'none';
            }
        }

        async function updateTripStatus(tripId, newStatus) {
            const { error } = await supabaseClient
                .from('trips')
                .update({ status: newStatus, updated_at: new Date() })
                .eq('id', tripId);
            if (error) {
                alert('Error actualizando viaje: ' + error.message);
            } else {
                await loadCurrentTrip();
                await loadTripHistory();
            }
        }

        // Cargar historial de viajes
        async function loadTripHistory() {
            const { data, error } = await supabaseClient
                .from('trips')
                .select('*, passenger:passenger_id(full_name)')
                .eq('driver_id', currentUser.id)
                .in('status', ['completed', 'cancelled'])
                .order('created_at', { ascending: false })
                .limit(10);
            if (error) {
                console.error('Error cargando historial:', error);
                return;
            }
            const historyDiv = document.getElementById('trips-history');
            if (!data || data.length === 0) {
                historyDiv.innerHTML = '<p>No hay viajes realizados.</p>';
                return;
            }
            historyDiv.innerHTML = data.map(trip => `
                <div class="list-item">
                    <p><strong>${trip.passenger?.full_name || 'Desconocido'}</strong> - ${trip.pickup_location} → ${trip.dropoff_location}</p>
                    <p><span class="status-badge status-${trip.status}">${trip.status}</span> - ${new Date(trip.created_at).toLocaleString()}</p>
                </div>
            `).join('');
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', checkSession);
    </script>
</body>
</html>
